<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログ分析ダッシュボード | Shobi Navigator</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; min-height: 100vh; padding: 0 0 4em; }

    /* ─── Header ─── */
    .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 1.2em 2em; display: flex; align-items: center; gap: 1.2em; flex-wrap: wrap; }
    .header h1 { font-size: 1.25em; color: #58a6ff; font-weight: 700; letter-spacing: 0.03em; }
    .header .subtitle { color: #8b949e; font-size: 0.82em; }

    /* ─── Controls ─── */
    .controls { padding: 1em 2em; display: flex; gap: 0.7em; flex-wrap: wrap; align-items: center; background: #0d1117; border-bottom: 1px solid #21262d; }
    button { padding: 0.4em 1em; border-radius: 6px; border: none; cursor: pointer; font-size: 0.87em; font-family: inherit; font-weight: 600; transition: opacity .15s; }
    button:hover { opacity: 0.82; }
    .btn-dl    { background: #238636; color: #fff; }
    .btn-clear { background: #6e2020; color: #ffaaaa; }
    .btn-ref   { background: #1f2d3d; color: #58a6ff; border: 1px solid #30363d; }
    .btn-dedup { background: #1f2d3d; color: #ffd700; border: 1px solid #30363d; }
    .btn-dedup.active { background: #2d2200; border-color: #ffd700; }
    .btn-import { background: #1f2d3d; color: #00ff99; border: 1px solid #30363d; }
    #filter { background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 0.38em 0.8em; font-size: 0.87em; font-family: inherit; width: 240px; }
    #log-count { color: #8b949e; font-size: 0.85em; white-space: nowrap; }
    #file-input { display: none; }

    /* ─── Summary cards ─── */
    .summary { display: flex; gap: 1em; padding: 1.2em 2em; flex-wrap: wrap; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 1em 1.4em; min-width: 140px; flex: 1; }
    .card .label { color: #8b949e; font-size: 0.78em; margin-bottom: 0.3em; }
    .card .value { font-size: 1.8em; font-weight: 700; color: #58a6ff; }
    .card .value.green  { color: #00ff99; }
    .card .value.yellow { color: #ffd700; }
    .card .value.cyan   { color: #00bfff; }

    /* ─── Section heading ─── */
    .section-title { font-size: 0.95em; font-weight: 700; color: #8b949e; text-transform: uppercase; letter-spacing: 0.08em; padding: 1.4em 2em 0.5em; border-top: 1px solid #21262d; }

    /* ─── Charts grid ─── */
    .charts-grid { display: grid; gap: 1.2em; padding: 0 2em; }
    .charts-grid-3 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .charts-grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
    .charts-grid-1 { grid-template-columns: 1fr; }

    .chart-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 1.2em; overflow: hidden; }
    .chart-card h3 { font-size: 0.9em; color: #c9d1d9; margin-bottom: 0.8em; text-align: center; }
    .chart-wrap-bar { position: relative; width: 100%; }

    /* ─── Legend ─── */
    .legend { margin-top: 0.8em; display: flex; flex-wrap: wrap; gap: 0.35em 0.8em; justify-content: center; font-size: 0.78em; color: #c9d1d9; }
    .legend-item { display: flex; align-items: center; gap: 0.3em; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ─── Log table ─── */
    .table-wrap { padding: 0 2em; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.78em; table-layout: fixed; }
    th { background: #161b22; color: #58a6ff; padding: 0.5em 0.7em; text-align: left; border-bottom: 1px solid #30363d; position: sticky; top: 0; white-space: nowrap; z-index: 1; overflow: hidden; }
    td { padding: 0.45em 0.7em; border-bottom: 1px solid #21262d; vertical-align: top; word-break: break-word; overflow-wrap: break-word; overflow: hidden; }
    tr:hover td { background: #161b22; }
    .tag { display: inline-block; background: #0d2040; border: 1px solid #30363d; border-radius: 4px; padding: 0.1em 0.4em; margin: 0.1em; font-size: 0.85em; white-space: nowrap; }
    #no-log { color: #8b949e; text-align: center; padding: 3em; }

    @media (max-width: 600px) {
      .header, .controls, .summary, .section-title, .charts-grid, .table-wrap { padding-left: 1em; padding-right: 1em; }
      .charts-grid { padding: 0 1em; }
      .charts-grid-3, .charts-grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>ログ分析ダッシュボード</h1>
    <div class="subtitle">Shobi Navigator — 利用ログ統計</div>
  </div>

  <div class="controls">
    <button class="btn-ref"    onclick="reload()">GAS再取得</button>
    <button class="btn-dedup active" id="btn-dedup" onclick="toggleDedup()">重複IP除去 ON</button>
    <button class="btn-dedup" id="btn-dp-weight" onclick="toggleWeightedDP()">Q3重みづけ OFF</button>
    <button class="btn-import" onclick="document.getElementById('file-input').click()">JSONインポート</button>
    <button class="btn-dl"     onclick="downloadLog()">JSONダウンロード</button>
    <input  id="filter" type="text" placeholder="キーワードで絞り込み..." oninput="renderTable()">
    <span   id="log-count"></span>
    <span   id="data-source" style="font-size:0.82em;padding:0.3em 0.7em;border-radius:4px;background:#1f2d3d;color:#8b949e;border:1px solid #30363d;">読込中...</span>
    <input  id="file-input" type="file" accept=".json" onchange="importJSON(event)">
  </div>

  <!-- Summary -->
  <div class="summary" id="summary-area"></div>

  <!-- Q1～Q4 分布 -->
  <div class="section-title">Q1～Q4 回答分布</div>

  <!-- Q1！8項目　Q2！3項目　Q4！5項目 → 3カラム -->
  <div class="charts-grid charts-grid-3">
    <div class="chart-card">
      <h3>Q1 興味のある分野</h3>
      <div class="chart-wrap-bar"><canvas id="chartQ1"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Q2 やりたいこと</h3>
      <div class="chart-wrap-bar"><canvas id="chartQ2"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Q4 楽器・演奏形態</h3>
      <div class="chart-wrap-bar"><canvas id="chartQ4"></canvas></div>
    </div>
  </div>

  <!-- Q3：20項目なので全幅 -->
  <div class="charts-grid charts-grid-1" style="margin-top:1.2em;">
    <div class="chart-card">
      <h3>Q3 身につけたい力（DP項目選択分布）</h3>
      <div class="chart-wrap-bar"><canvas id="chartQ3"></canvas></div>
    </div>
  </div>

  <!-- DP獲得率 -->
  <div class="section-title" style="margin-top:1.4em;">DP獲得率の傾向（平均）</div>
  <div class="charts-grid charts-grid-1">
    <div class="chart-card">
      <h3>DP獲得率 平均値（分析対象ログ）</h3>
      <div class="chart-wrap-bar"><canvas id="chartDP"></canvas></div>
    </div>
  </div>

  <!-- 専門性・領域・ブラウザ -->
  <div class="section-title" style="margin-top:1.4em;">専門性・領域・ブラウザ統計</div>
  <div class="charts-grid charts-grid-2" style="padding-bottom:1.2em;">
    <div class="chart-card">
      <h3>フィールド分布（専門性）</h3>
      <div class="chart-wrap-bar"><canvas id="chartField"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>領域分布</h3>
      <div class="chart-wrap-bar"><canvas id="chartDomain"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>ブラウザ統計</h3>
      <div class="chart-wrap-bar"><canvas id="chartBrowser"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>デバイス種別</h3>
      <div class="chart-wrap-bar"><canvas id="chartDevice"></canvas></div>
    </div>
  </div>

  <!-- Log Table -->
  <div class="section-title">ログ一覧</div>
  <div class="table-wrap">
    <div id="table-area"></div>
  </div>

  <script src="logger.js"></script>
  <script>
    // ========================
    //  定数・マップ
    // ========================
    const DP_LABELS = {
      "1-1":"本質を見抜く力（審美眼）", "1-2":"創造力・発想力", "1-3":"設計・構築力",
      "1-4":"論理的思考力", "1-5":"自己理解・自己実現力", "1-6":"独創的な芸術表現力",
      "2-1":"基礎的知識・技能の修得", "2-2":"標準的専門知識・技能の修得", "2-3":"発展的専門知識・技能の修得",
      "2-4":"専門知識・技能の応用・実践力", "2-5":"専門知識・技能の統合力",
      "3-1":"文章読解力", "3-2":"文章表現力", "3-3":"協調性・協働する力",
      "3-4":"基礎的ITスキル", "3-5":"プレゼンテーション能力", "3-6":"異文化理解力・外国語能力",
      "4-1":"共感力・相互理解力", "4-2":"規律性・倫理観", "4-3":"自己研鑽力（学び続ける力）"
    };
    const Q1_MAP = {
      pops:'ポピュラー音楽', classic:'クラシック音楽', sound:'サウンドエンジニアリング',
      dance:'ダンス・身体表現', act:'演劇・声優', vocal:'オペラ・ミュージカル・声楽',
      entertainment:'エンタメ・総合芸術', it:'IT・先端技術'
    };
    const Q2_MAP = { create:'クリエイト・制作', performance:'パフォーマンス', business:'ビジネス' };
    const Q3_MAP = DP_LABELS; // Q3回答キーは "1-1"〜"4-3"（dpLabels準拠）
    const Q4_MAP = {
      keyboard:'キーボード・ピアノ', brass:'管楽器・パーカッション',
      ensemble:'バンドアンサンブル', vocal:'声楽・オペラ・ミュージカル'
    };
    const PALETTE = ['#58a6ff','#00ff99','#ffd700','#00bfff','#ff66cc','#ff9966','#c9a0ff','#66ffcc','#ffcc00','#ff4466'];
    const GAS_URL  = 'https://script.google.com/macros/s/AKfycbx98LVRe5BrfHXdZaEiee-mZ-0ZOMB0kDp6CTIcsi-SIkTEUGIVUEMTjf7ootuXruKytA/exec';

    // ========================
    //  状態
    // ========================
    let dedupEnabled = true;
    let weightedDPEnabled = false;
    let gasLogs      = null;  // GASから取得したログ
    let importedLogs = null;  // JSONインポート分

    // ========================
    //  データ取得
    // ========================
    function getRawLogs() {
      // 優先順: JSONインポート > GAS取得 > localStorage
      if (importedLogs !== null) return importedLogs;
      if (gasLogs      !== null) return gasLogs;
      return AppLogger.load();
    }

    function getAnalysisLogs() {
      const raw = getRawLogs();
      if (!dedupEnabled) return raw;
      const ipMap = new Map();
      raw.forEach(l => {
        const key = l.ip ? l.ip : ('__noip__' + l.timestamp);
        if (!ipMap.has(key) || new Date(l.timestamp) > new Date(ipMap.get(key).timestamp)) {
          ipMap.set(key, l);
        }
      });
      return Array.from(ipMap.values());
    }

    // ========================
    //  GASからログ取得
    // ========================
    async function fetchFromGAS() {
      const src = document.getElementById('data-source');
      if (src) { src.textContent = '読込中...'; src.style.color = '#8b949e'; }
      try {
        const res  = await fetch(GAS_URL + '?action=getLogs');
        const data = await res.json();
        if (Array.isArray(data)) {
          gasLogs = data;
          if (src) { src.textContent = `GAS データ (${data.length}件)`; src.style.color = '#00ff99'; }
        } else {
          throw new Error(data.error || 'GASからの応答が不正です');
        }
      } catch(e) {
        gasLogs = null;
        if (src) { src.textContent = `GAS取得失敗—ローカルキャッシュを使用`; src.style.color = '#ffd700'; }
        console.warn('[log-viewer] GAS取得失敗:', e);
      }
    }

    // ========================
    //  小きなユーティリティ
    // ========================
    function toJST(str) {
      if (!str) return '';
      return new Date(str).toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo', hour12: false }).replace(/\//g, '-');
    }

    function getBrowserName(ua) {
      if (!ua) return 'Unknown';
      if (/Edg\//.test(ua))     return 'Edge';
      if (/OPR\//.test(ua))     return 'Opera';
      if (/Firefox\//.test(ua)) return 'Firefox';
      if (/CriOS\//.test(ua))   return 'Chrome (iOS)';
      if (/FxiOS\//.test(ua))   return 'Firefox (iOS)';
      if (/Chrome\//.test(ua))  return 'Chrome';
      if (/Safari\//.test(ua))  return 'Safari';
      return 'Other';
    }

    function getDeviceType(ua) {
      if (!ua) return 'Unknown';
      if (/iPhone/.test(ua))  return 'iPhone';
      if (/iPad/.test(ua))    return 'iPad';
      if (/Android/.test(ua)) return 'Android';
      return 'PC';
    }

    // "キー: 値, キー: 値" → { キー: 値 }
    function parseKVString(str) {
      const result = {};
      if (!str) return result;
      str.split(',').forEach(part => {
        const ci = part.lastIndexOf(':');
        if (ci === -1) return;
        const key = part.slice(0, ci).trim();
        const val = parseFloat(part.slice(ci + 1).trim());
        if (key && !isNaN(val)) result[key] = val;
      });
      return result;
    }

    function countOptions(logs, qKey, labelMap) {
      const counts = {};
      Object.values(labelMap).forEach(v => { counts[v] = 0; });
      logs.forEach(l => {
        ((l.answers || {})[qKey] || []).forEach(k => {
          if (!labelMap[k]) return;  // マップにないキー（不正値・タイムスタンプ等）を除外
          counts[labelMap[k]] = (counts[labelMap[k]] || 0) + 1;
        });
      });
      return counts;
    }

    // ========================
    //  Chart helpers
    // ========================
    const chartInstances = {};

    function destroyChart(id) {
      if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
    }

    function renderDoughnut(canvasId, _legendId, labels, data) {
      renderBarCount(canvasId, labels, data);
    }

    function renderBarCount(canvasId, labels, data) {
      destroyChart(canvasId);
      const el = document.getElementById(canvasId);
      if (!el) return;
      // 項目数に応じて高さを動的設定しグラフが潰れないようにする
      const barH = 36;
      const minH = 80;
      el.style.height = Math.max(labels.length * barH + 40, minH) + 'px';
      const bgColors = data.map((_, i) => PALETTE[i % PALETTE.length]);
      chartInstances[canvasId] = new Chart(el.getContext('2d'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{ data, backgroundColor: bgColors, borderRadius: 4 }]
        },
        options: {
          indexAxis: 'y',
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: c => ` ${c.raw}件` } }
          },
          scales: {
            x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' }, beginAtZero: true },
            y: { ticks: { color: '#c9d1d9', font: { size: 11 } }, grid: { color: '#21262d' } }
          },
          responsive: true
        }
      });
    }

    function renderBar(canvasId, labels, data) {
      destroyChart(canvasId);
      const el = document.getElementById(canvasId);
      if (!el) return;
      const barH = 36;
      el.style.height = Math.max(labels.length * barH + 40, 80) + 'px';
      const bgColors = data.map((_, i) => PALETTE[i % PALETTE.length]);
      chartInstances[canvasId] = new Chart(el.getContext('2d'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{ label: '平均DP値', data: data.map(v => Math.round(v * 10) / 10), backgroundColor: bgColors, borderRadius: 4 }]
        },
        options: {
          indexAxis: 'y',
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: c => ` 平均: ${c.raw}` } }
          },
          scales: {
            x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' }, beginAtZero: true },
            y: { ticks: { color: '#c9d1d9', font: { size: 11 } }, grid: { color: '#21262d' } }
          },
          responsive: true
        }
      });
    }

    // ========================
    //  Summary
    // ========================
    function renderSummary(raw, analysis) {
      const dates = raw.map(l => l.timestamp).filter(Boolean).sort();
      const ips = new Set(raw.map(l => l.ip).filter(Boolean));
      document.getElementById('summary-area').innerHTML = `
        <div class="card"><div class="label">総ログ件数</div><div class="value">${raw.length}</div></div>
        <div class="card"><div class="label">重複IP除去後</div><div class="value green">${analysis.length}</div></div>
        <div class="card"><div class="label">ユニークIP数</div><div class="value cyan">${ips.size}</div></div>
        <div class="card"><div class="label">最古ログ</div><div class="value yellow" style="font-size:0.85em;">${dates[0] ? toJST(dates[0]).slice(0,10) : '—'}</div></div>
        <div class="card"><div class="label">最新ログ</div><div class="value yellow" style="font-size:0.85em;">${dates[dates.length-1] ? toJST(dates[dates.length-1]).slice(0,10) : '—'}</div></div>
      `;
    }

    // ========================
    //  Q1～Q4 charts
    // ========================
    function renderQCharts(logs) {
      const q1 = countOptions(logs, 'q1', Q1_MAP);
      const q2 = countOptions(logs, 'q2', Q2_MAP);
      const q3 = countOptions(logs, 'q3', Q3_MAP);
      const q4 = countOptions(logs, 'q4', Q4_MAP);

      renderBarCount('chartQ1', Object.keys(q1), Object.values(q1));
      renderBarCount('chartQ2', Object.keys(q2), Object.values(q2));
      renderBarCount('chartQ3', Object.keys(q3), Object.values(q3));
      // Q4「選択なし」集計
      const q4None = logs.filter(l => !((l.answers||{}).q4?.length)).length;
      if (q4None > 0) q4['選択なし'] = q4None;
      renderBarCount('chartQ4', Object.keys(q4), Object.values(q4));
    }

    // ========================
    //  DP rate bar chart
    // ========================
    const Q3_RATES = [0.3, 0.25, 0.2, 0.15, 0.1]; // app.js と同じ優先度重み

    function renderDPChart(logs) {
      const labels = Object.values(DP_LABELS);
      let avgs;

      if (weightedDPEnabled) {
        // Q3選択順による重みづけ平均
        // 各ログの dpRate 値を、そのユーザーの Q3 選択順に対応する重みで加重平均する
        const wSum = {}, wTotal = {};
        logs.forEach(l => {
          if (!l.dpRate) return;
          const dpValues = parseKVString(l.dpRate);
          const q3 = (l.answers || {}).q3 || [];
          Object.entries(DP_LABELS).forEach(([key, label]) => {
            const val = dpValues[label] ?? 0;
            const idx = q3.indexOf(key);
            const weight = (idx >= 0 && idx < Q3_RATES.length) ? Q3_RATES[idx] : 0;
            if (weight > 0) {
              wSum[label]   = (wSum[label]   || 0) + val * weight;
              wTotal[label] = (wTotal[label] || 0) + weight;
            }
          });
        });
        avgs = labels.map(label => wTotal[label] ? wSum[label] / wTotal[label] : 0);
      } else {
        // 単純平均（従来通り）
        const sum = {}, cnt = {};
        logs.forEach(l => {
          if (!l.dpRate) return;
          Object.entries(parseKVString(l.dpRate)).forEach(([k, v]) => {
            sum[k] = (sum[k] || 0) + v;
            cnt[k] = (cnt[k] || 0) + 1;
          });
        });
        avgs = labels.map(label => cnt[label] ? sum[label] / cnt[label] : 0);
      }

      // チャートタイトル更新
      const h3 = document.getElementById('chartDP')?.closest('.chart-card')?.querySelector('h3');
      if (h3) h3.textContent = weightedDPEnabled
        ? 'DP獲得率 Q3優先度重みづけ平均（分析対象ログ）'
        : 'DP獲得率 平均値（分析対象ログ）';

      renderBar('chartDP', labels, avgs);
    }

    function toggleWeightedDP() {
      weightedDPEnabled = !weightedDPEnabled;
      const btn = document.getElementById('btn-dp-weight');
      btn.textContent = weightedDPEnabled ? 'Q3重みづけ ON' : 'Q3重みづけ OFF';
      btn.classList.toggle('active', weightedDPEnabled);
      renderDPChart(getAnalysisLogs());
    }

    // ========================
    //  Specialty charts
    // ========================
    function renderSpecialtyCharts(logs) {
      const fSum = {}, fCnt = {}, dSum = {}, dCnt = {};
      logs.forEach(l => {
        if (!l.specialty) return;
        l.specialty.split('\n').forEach(line => {
          if (line.startsWith('フィールド:')) {
            Object.entries(parseKVString(line.replace(/^フィールド:\s*/, ''))).forEach(([k, v]) => {
              fSum[k] = (fSum[k] || 0) + v; fCnt[k] = (fCnt[k] || 0) + 1;
            });
          } else if (line.startsWith('分野:')) {
            Object.entries(parseKVString(line.replace(/^分野:\s*/, ''))).forEach(([k, v]) => {
              dSum[k] = (dSum[k] || 0) + v; dCnt[k] = (dCnt[k] || 0) + 1;
            });
          }
        });
      });
      const fLabels = Object.keys(fSum);
      const fAvgs   = fLabels.map(k => Math.round(fSum[k] / fCnt[k] * 10) / 10);
      const dLabels = Object.keys(dSum);
      const dAvgs   = dLabels.map(k => Math.round(dSum[k] / dCnt[k] * 10) / 10);
      renderBarCount('chartField', fLabels, fAvgs);
      renderBarCount('chartDomain', dLabels, dAvgs);
    }

    // ========================
    //  Browser & Device charts
    // ========================
    function renderBrowserCharts(logs) {
      const bCnt = {}, dCnt = {};
      logs.forEach(l => {
        const b = getBrowserName(l.browser); bCnt[b] = (bCnt[b] || 0) + 1;
        const d = getDeviceType(l.browser);  dCnt[d] = (dCnt[d] || 0) + 1;
      });
      renderBarCount('chartBrowser', Object.keys(bCnt), Object.values(bCnt));
      renderBarCount('chartDevice',  Object.keys(dCnt), Object.values(dCnt));
    }

    // ========================
    //  Log table → ボタン + 別ウィンドウ
    // ========================
    let _currentDisplayLogs = [];

    function renderTable() {
      const raw      = getRawLogs();
      const analysis = getAnalysisLogs();
      const keyword  = (document.getElementById('filter')?.value || '').trim().toLowerCase();
      let display    = keyword
        ? [...analysis].filter(l => JSON.stringify(l).toLowerCase().includes(keyword))
        : [...analysis];
      display.reverse();
      _currentDisplayLogs = display;

      document.getElementById('log-count').textContent =
        `全 ${raw.length} 件 / IP除去後 ${analysis.length} 件 / 表示 ${display.length} 件`;

      const area = document.getElementById('table-area');
      const n = display.length;
      if (n === 0) {
        area.innerHTML = '<div id="no-log">ログがありません。</div>';
        return;
      }

      // 50件ごとにボタンを生成
      const pageSize = 50;
      const btnEls = [];
      if (n <= pageSize) {
        btnEls.push(`<button class="btn-ref" style="margin:0.3em;" onclick="openLogRange(1,${n})">ログ1〜${n}</button>`);
      } else {
        for (let s = 1; s <= n; s += pageSize) {
          const e = Math.min(s + pageSize - 1, n);
          btnEls.push(`<button class="btn-ref" style="margin:0.3em;" onclick="openLogRange(${s},${e})">ログ${s}〜${e}</button>`);
        }
      }
      area.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:0.4em;padding:0.8em 0;">${btnEls.join('')}</div>`;
    }

    function buildLogRow(l, rowNum) {
      const ans = l.answers || {};
      const q1  = (ans.q1||[]).map(k=>`<span class="tag">${Q1_MAP[k]||k}</span>`).join('');
      const q2  = (ans.q2||[]).map(k=>`<span class="tag">${Q2_MAP[k]||k}</span>`).join('');
      const q3  = (ans.q3||[]).map(k=>`<span class="tag">${Q3_MAP[k]||k}</span>`).join('');
      const q4  = (ans.q4||[]).map(k=>`<span class="tag">${Q4_MAP[k]||k}</span>`).join('') || '<span style="color:#555">なし</span>';
      const dp  = (l.dpRate   ||'').replace(/,\s*/g,'<br>');
      const sp  = (l.specialty||'').replace(/\n/g,' / ').replace(/,\s*/g,'<br>');
      return '<tr>' +
        '<td style="color:#8b949e;text-align:center;">' + rowNum + '</td>' +
        '<td style="white-space:nowrap;color:#8b949e;">' + toJST(l.timestamp) + '</td>' +
        '<td style="color:#8b949e;">' + (l.ip || '—') + '</td>' +
        '<td><b style="color:#8b949e;font-size:0.75em;">Q1</b> ' + q1 + '<br>' +
            '<b style="color:#8b949e;font-size:0.75em;">Q2</b> ' + q2 + '<br>' +
            '<b style="color:#8b949e;font-size:0.75em;">Q3</b> ' + q3 + '<br>' +
            '<b style="color:#8b949e;font-size:0.75em;">Q4</b> ' + q4 + '</td>' +
        '<td style="color:#8b949e;">' + dp + '</td>' +
        '<td style="color:#8b949e;">' + sp + '</td>' +
        '<td style="color:#c9d1d9;">' + (l.aiReply || '<span style="color:#555">未取得</span>') + '</td>' +
        '<td style="color:#555;">' + getBrowserName(l.browser) + ' / ' + getDeviceType(l.browser) + '</td>' +
        '</tr>';
    }

    function openLogRange(start1, end1) {
      const slice = _currentDisplayLogs.slice(start1 - 1, end1);
      const win = window.open('', '_blank', 'width=1400,height=800,scrollbars=yes,resizable=yes');
      if (!win) { alert('ポップアップがブロックされました。ブラウザの設定を確認してください。'); return; }
      const tableRows = slice.map((l, i) => buildLogRow(l, start1 + i)).join('');
      win.document.open();
      win.document.write(buildLogWindowHTML(tableRows, start1, end1, slice.length));
      win.document.close();
    }

    function buildLogWindowHTML(tableRows, start1, end1, count) {
      return '<!DOCTYPE html>' +
        '<html lang="ja"><head><meta charset="UTF-8">' +
        '<title>ログ一覧 ' + start1 + '〜' + end1 + ' | Shobi Navigator</title>' +
        '<style>' +
        '*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }' +
        'body { background: #0d1117; color: #c9d1d9; font-family: \'Segoe UI\', \'Hiragino Sans\', sans-serif; padding: 1em 2em 4em; }' +
        'h2 { color: #58a6ff; font-size: 1.05em; font-weight: 700; padding: 0.8em 0; border-bottom: 1px solid #30363d; margin-bottom: 0.8em; }' +
        'table { width: 100%; border-collapse: collapse; font-size: 0.78em; table-layout: fixed; }' +
        'th { background: #161b22; color: #58a6ff; padding: 0.5em 0.7em; text-align: left; border-bottom: 1px solid #30363d; position: sticky; top: 0; white-space: nowrap; z-index: 1; overflow: hidden; }' +
        'td { padding: 0.45em 0.7em; border-bottom: 1px solid #21262d; vertical-align: top; word-break: break-word; overflow-wrap: break-word; overflow: hidden; }' +
        'tr:hover td { background: #161b22; }' +
        '.tag { display: inline-block; background: #0d2040; border: 1px solid #30363d; border-radius: 4px; padding: 0.1em 0.4em; margin: 0.1em; font-size: 0.85em; white-space: nowrap; }' +
        '</style></head><body>' +
        '<h2>ログ一覧 ' + start1 + '〜' + end1 + '（' + count + ' 件）</h2>' +
        '<table><colgroup>' +
        '<col style="width:3%"><col style="width:9%"><col style="width:5%">' +
        '<col style="width:21%"><col style="width:14%"><col style="width:14%">' +
        '<col style="width:23%"><col style="width:11%">' +
        '</colgroup><thead><tr>' +
        '<th>#</th><th>日時</th><th>IP</th><th>選択内容 (Q1〜Q4)</th>' +
        '<th>DP獲得率</th><th>専門性・領域</th><th>AIコメント</th><th>ブラウザ/端末</th>' +
        '</tr></thead><tbody>' + tableRows + '</tbody></table>' +
        '</body></html>';
    }

    // ========================
    //  全体再描画
    // ========================
    //  全体再描画
    // ========================
    function renderAll() {
      const raw      = getRawLogs();
      const analysis = getAnalysisLogs();
      renderSummary(raw, analysis);
      renderQCharts(analysis);
      renderDPChart(analysis);
      renderSpecialtyCharts(analysis);
      renderBrowserCharts(analysis);
      renderTable();
    }

    // ========================
    //  操作ハンドラ
    // ========================
    async function reload() {
      importedLogs = null;
      await fetchFromGAS();
      renderAll();
    }

    function toggleDedup() {
      dedupEnabled = !dedupEnabled;
      const btn = document.getElementById('btn-dedup');
      btn.textContent = dedupEnabled ? '重複IP除去 ON' : '重複IP除去 OFF';
      btn.classList.toggle('active', dedupEnabled);
      renderAll();
    }

    function downloadLog() {
      const logs = getRawLogs();
      if (logs.length === 0) { alert('ログがありません。'); return; }
      const blob = new Blob([JSON.stringify(logs, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      const date = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
      a.href = url; a.download = `shobi_log_${date}.json`;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    function clearLog() {
      if (!confirm(`ログを全 ${AppLogger.count()} 件削除します。よろしいですか？`)) return;
      AppLogger.clear();
      importedLogs = null;
      renderAll();
    }

    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data)) { alert('無効なJSON形式です（配列で渡してください）'); return; }
          importedLogs = data;
          const src = document.getElementById('data-source');
          if (src) { src.textContent = `インポート (${data.length}件)`; src.style.color = '#00bfff'; }
          alert(`${data.length} 件のログをインポートしました。`);
          renderAll();
        } catch(err) {
          alert('JSONの解析に失敗しました: ' + err.message);
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // ========================
    //  初期起動
    // ========================
    async function initApp() {
      await fetchFromGAS();
      renderAll();
    }
    initApp();
  </script>
</body>
</html>
